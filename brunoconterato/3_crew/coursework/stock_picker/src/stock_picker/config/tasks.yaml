find_trending_companies_task:
  description: >
    Você vai conduzir pesquisas das últimas notícias sobre mercados financeiros e suas companhias.
    Garanta que a pesquisa seja atual para a data de {current_date}.
    A partir da pesquisa, escolha 2 ou 3 companhias diferentes cujas ações tenham potencial relevante
    de crescimento no prazo de 1 a 2 anos a partir de {current_date}.
    Use as ferramentas disponíveis para buscar fontes recentes e verificar páginas relevantes antes
    de produzir a resposta final.
  expected_output: >
    Uma saída estruturada, compatível com o modelo de dados esperado pela tarefa,
    contendo 2 ou 3 companhias com ações consideradas promissoras para crescimento.
    Para cada companhia, inclua identificação da empresa, ticker oficial, descrição objetiva
    da atividade e os principais motivos que justificam sua escolha como candidata promissora
    para crescimento no prazo de 1 a 2 anos a partir de {current_date}.
    Não produza um relatório livre em texto corrido; organize a resposta como um objeto estruturado.
  agent: trending_company_finder

research_trending_companies_task:
  description: >
    Você vai receber uma saída estruturada com empresas cujas ações têm grande potencial de crescimento.
    Você vai analisar as informações sobre essas empresas em relação à possibilidade de crescimento
    e produzir uma análise sobre cada uma delas em relação aos seus aspectos financeiros,
    operacionais, competitivos e estratégicos mais relevantes.
    A análise precisa ser atual para a data de {current_date}.
  expected_output: >
    Uma saída estruturada, compatível com o modelo de dados esperado pela tarefa,
    contendo a análise de 2 a 3 empresas com ações de reconhecido potencial de crescimento.
    Para cada empresa, apresente sua posição atual no mercado, sua situação competitiva,
    suas perspectivas futuras e uma avaliação objetiva do potencial de investimento
    nos próximos 1 a 2 anos a partir de {current_date}.
    Não produza um relatório livre em texto corrido; organize a resposta como um objeto estruturado.
  agent: financial_researcher
  context:
    - find_trending_companies_task

pick_best_company_task:
  description: >
    Você receberá uma saída estruturada sobre finanças, operações e potencial de crescimento
    de 2 ou 3 companhias, atualizada para a data de {current_date}.
    Você deverá analisar essas companhias e escolher uma única empresa cuja ação aparente ter
    o maior potencial de crescimento nos próximos 1 a 2 anos.
  expected_output: >
    Uma saída estruturada, compatível com o modelo de dados esperado pela tarefa,
    contendo uma única companhia selecionada como a melhor oportunidade entre as analisadas.
    Inclua a identificação da empresa, ticker oficial, descrição objetiva da atividade
    e as principais razões que sustentam sua escolha como a ação com maior potencial
    de crescimento nos próximos 1 a 2 anos a partir de {current_date}.
    Não produza um relatório livre em texto corrido; organize a resposta como um objeto estruturado.
  agent: stock_picker
  context:
    - research_trending_companies_task
