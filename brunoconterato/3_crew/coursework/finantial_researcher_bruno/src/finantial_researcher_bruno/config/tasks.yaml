pesquisa:
  description: >
    Pesquise a empresa {company} e produza um dossiê factual com base em
    fontes públicas recentes.
    Seu trabalho deve focar:
    1. Registrar fatos, datas, eventos e números relevantes
    2. Identificar notícias, resultados, indicadores e comunicados importantes
    3. Listar fontes e sinais que possam ser úteis para uma análise posterior
    4. Evitar conclusões executivas profundas ou recomendações
    5. Organizar a resposta em seções claras, objetivas e fáceis de consultar
    IMPORTANTE: sua informação deve ser relevante para a data de {currentdate}.
    Ao usar a ferramenta de busca, use URL completa no campo website.
    Se o site não estiver indisponivel, registre a limitacao e continue
    a pesquisa com outras fontes publicas.
    Use apenas Fontes confiáveis.
    Use essa ferramenta assim: primeiro faça uma busca;
    depois, para cada página que parecer relevante, chame `fetch_html_tool`;
    extraia fatos, números e trechos úteis dessa página antes de seguir para a próxima;
    registre na resposta quais páginas foram lidas com a too;
    faça mais buscas se necessário.
    Limites máximos: 2 searches + 5 fetchs de html.
  expected_output: >
    Um dossiê de pesquisa sobre a empresa {company} com fatos principais,
    indicadores encontrados, eventos relevantes e fontes ou referências úteis.
    O texto deve ser descritivo e voltado à coleta de informação.
  agent: pesquisador_financeiro
  output_file: output/research_{currentdate}.md

analise:
  description: >
    Analise o dossiê de pesquisa sobre a empresa {company} e transforme-o em
    um relatório executivo original.
    Seu trabalho deve focar:
    1. Interpretar os fatos e apontar o que eles sugerem
    2. Destacar tendências, riscos, forças e fraquezas
    3. Comparar sinais positivos e negativos com julgamento próprio
    4. Escrever uma conclusão clara, sem repetir o dossiê de forma mecânica
    5. Entregar uma visão de mercado mais sintética e opinativa
  expected_output: >
    Um relatório analítico e executivo sobre a empresa {company}, com resumo
    executivo, interpretação dos dados, principais conclusões, riscos,
    oportunidades e uma visão final da situação da empresa.
  agent: analista_financeiro
  context:
    - pesquisa
  output_file: output/report_{currentdate}.md
