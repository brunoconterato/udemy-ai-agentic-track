    <text x="762" y="292"># Relatório Executivo Analítico - WEG (WEGE3)</text>
    <text x="762" y="330">**Data da Análise:** 03 de Julho de 2026</text>
    <text x="762" y="369">## Resumo Executivo</text>
    <text x="762" y="410">A WEG apresenta um cenário financeiro misto no primeiro trimestr</text>
    <text x="762" y="429">e de 2026, marcado por uma contração do lucro líquido de 5,7%</text>
    <text x="762" y="448">YoY, impactada significativamente pela volatilidade cambial</text>
    <text x="762" y="467">nas receitas internacionais. Apesar deste resultado intermedi</text>
    <text x="762" y="486">ário, a empresa demonstra posicionamento estratégico agressivo,</text>
    <text x="762" y="505">confirmando seu compromisso com o crescimento através de</text>
    <text x="762" y="524">investimentos substanciais em ativos imobilizados e intangíveis.</text>
    <text x="762" y="543">Superando valores praticados no ano anterior.</text>
    <text x="762" y="641">## 1. Interpretação dos Fatos Chave</text>
    <text x="762" y="721">Os dados factuais fornecidos não apenas mostram o desempenho</text>
    <text x="762" y="740">financeiro recente, mas também revelam a dinâmica operacional</text>
    <text x="762" y="759">e estratégica da WEG.</text>
